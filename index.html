<style>
  :root{ --line:rgba(255,255,255,.7); --radius:22px; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:auto;min-height:100%}
  html{scroll-behavior:smooth}
  body{font-family:'Jost',sans-serif;color:#fff;min-height:100dvh;background:#1a140c;
    display:flex;justify-content:center;align-items:flex-start;
    padding:0;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    overflow-x:hidden;-webkit-overflow-scrolling:touch}
  .backdrop{display:none;position:fixed;inset:0;z-index:-2;overflow:hidden;background:#1a140c}
  .backdrop video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .backdrop video{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(1.25);
    min-width:100%;min-height:100%;object-fit:cover;filter:blur(34px) brightness(.5) saturate(1.1)}
  .backdrop::after{content:"";position:absolute;inset:0;background:rgba(20,15,8,.35)}

  .card{width:100%;max-width:480px;min-height:100dvh;position:relative;
    display:flex;flex-direction:column;justify-content:center;animation:fade .6s ease both}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .card .cardvid{position:fixed;top:0;left:50%;transform:translateX(-50%) translateZ(0);width:100%;max-width:480px;height:100vh;height:100dvh;object-fit:cover;z-index:-1;backface-visibility:hidden}
  .card .scrim{position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(180deg, rgba(0,0,0,.28) 0%, rgba(0,0,0,.02) 16%, rgba(0,0,0,0) 45%, rgba(0,0,0,.04) 72%, rgba(0,0,0,.30) 100%)}
  .content{position:relative;z-index:2;padding:24px 18px 44px;width:100%}

  .topbar{display:flex;justify-content:space-between;margin-bottom:8px}
  .chip{width:42px;height:42px;border-radius:50%;background:rgba(20,16,10,.42);color:#fff;
        display:grid;place-items:center;text-decoration:none;backdrop-filter:blur(6px);
        border:1px solid rgba(255,255,255,.25);transition:transform .2s}
  .chip:hover{transform:scale(1.08)}
  .chip svg{width:18px;height:18px}
  .chip .ast{font-size:21px;line-height:1;font-weight:700}

  .profile{display:flex;flex-direction:column;align-items:center;text-align:center}
  .profile [data-pos]{width:100%}
  .avatar{width:90px;height:90px;border-radius:50%;object-fit:cover;background:#000;
          box-shadow:0 10px 30px rgba(0,0,0,.6)}
  .name{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:9px}.nm{font-family:'Cormorant Garamond',serif;font-weight:700;letter-spacing:.1em;font-size:33px;text-transform:uppercase;background:linear-gradient(100deg,#f7ecc4 0%,#d4a84b 22%,#fff6da 42%,#c9952b 58%,#f7ecc4 82%);background-size:220% auto;-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent;animation:shine 4.5s linear infinite;filter:drop-shadow(0 2px 12px rgba(0,0,0,.75))}.verified{display:grid;place-items:center;filter:drop-shadow(0 2px 6px rgba(0,0,0,.55))}.verified svg{width:24px;height:24px;display:block}@keyframes shine{to{background-position:220% center}}
  .bio{margin-top:2px;font-size:14px;font-weight:600;letter-spacing:.02em;color:#fff;
       text-shadow:0 2px 12px rgba(0,0,0,.85)}

  .socials{display:flex;justify-content:center;gap:16px;margin:11px 0 0}
  .socials a{width:30px;height:30px;color:#fff;display:grid;place-items:center;
            transition:transform .2s;filter:drop-shadow(0 3px 8px rgba(0,0,0,.55))}
  .socials a:hover{transform:translateY(-3px) scale(1.1)}
  .socials svg{width:30px;height:30px;display:block}

  .links{margin-top:14px;display:grid;grid-template-columns:repeat(var(--cols,1),minmax(0,1fr));gap:var(--gap,10px)}
  .link{position:relative;overflow:hidden;display:flex;align-items:center;gap:14px;padding:26px 20px;border:1.5px solid rgba(212,168,75,.60);border-radius:var(--radius);background:rgba(0,0,0,.16);color:#fff;text-decoration:none;font-size:17.5px;font-weight:500;transition:transform .18s,background .25s,border-color .25s,box-shadow .25s;opacity:0;animation:rise .55s ease forwards}.link::before{content:"";position:absolute;top:0;left:0;width:55%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,236,180,.30),transparent);transform:translateX(-180%) skewX(-20deg);animation:sweep 6s ease-in-out infinite;pointer-events:none;will-change:transform}.link:nth-child(2)::before{animation-delay:.8s}.link:nth-child(3)::before{animation-delay:1.6s}.link:nth-child(4)::before{animation-delay:2.4s}.link:nth-child(5)::before{animation-delay:3.2s}.link:nth-child(6)::before{animation-delay:4s}.link:nth-child(7)::before{animation-delay:4.8s}@keyframes sweep{0%{transform:translateX(-180%) skewX(-20deg)}45%{transform:translateX(320%) skewX(-20deg)}100%{transform:translateX(320%) skewX(-20deg)}}
  .link:hover{transform:translateY(-2px);background:rgba(212,168,75,.18);border-color:#e7c873;box-shadow:0 0 0 1px rgba(212,168,75,.4),0 12px 30px rgba(180,140,40,.35)}
  .link .ico{flex:0 0 28px;display:grid;place-items:center;color:#fff;filter:drop-shadow(0 1px 3px rgba(0,0,0,.7))}
  .link .ico svg{width:28px;height:28px;display:block}
  .link .label{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
               line-height:1.3;text-shadow:0 1px 6px rgba(0,0,0,.85)}
  .link .dash{opacity:.65}
  .link .ar{font-family:'Cairo',sans-serif;font-weight:600}
  
  .link .dots{flex:0 0 28px;color:#fff;opacity:.55;display:grid;place-items:center}
  .link .dots svg{width:20px;height:20px}

  .footer{margin-top:13px;text-align:center;font-size:10px;letter-spacing:.22em;opacity:.8;
          text-transform:uppercase;text-shadow:0 1px 7px rgba(0,0,0,.85)}

  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:480px){.name{font-size:29px}}

  /* ---- shop display / kiosk controls ---- */
  .kiosk{position:fixed;bottom:16px;right:16px;display:flex;gap:10px;z-index:50}

  @media(min-width:520px){.card{max-width:480px}.backdrop{display:block}}

  /* featured button pulse (shop attention grabber) */

  .banner{margin:6px 14px 2px;padding:9px 14px 9px 14px;border-radius:12px;background:linear-gradient(90deg,rgba(212,168,75,.26),rgba(212,168,75,.10));border:1px solid rgba(212,168,75,.55);color:#fbeec2;font-size:13.5px;text-align:center;font-weight:600;letter-spacing:.01em;transition:opacity .3s;padding-right:34px}

  @media(prefers-reduced-motion:reduce){.link::before{animation:none}}

      var unicodeMap = {};
      while (true) {
        var b0 = bin.read();
        if (b0 == -1) break;
        var b1 = read();
        var b2 = read();
        var b3 = read();
        var k = String.fromCharCode( (b0 << 8) | b1);
        var v = (b2 << 8) | b3;
        unicodeMap[k] = v;
        count += 1;

      if (count != numChars) {
        throw count + ' != ' + numChars;
      }

      return unicodeMap;

    return function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else {

   Every 30s silently re-fetches config.json.
   If _savedAt changed → full re-render (new content live on all phones).
   If same → nothing changes (no flicker). */
(function(){
  var LAST=null;
  function checkUpdate(){
    fetch('config.json?_='+Date.now(),{cache:'no-store'})
      .then(function(r){return r.ok?r.json():null;})
      .then(function(c){
        if(!c)return;

          document.title=(c.seo&&c.seo.title)||document.title;

        LAST=stamp;
      }).catch(function(){});
  }
  setTimeout(function(){checkUpdate();setInterval(checkUpdate,30000);},5000);
}());

  function _lbShow(){
    document.getElementById('lbimg').src=_lbSrcs[_lbIdx]||'';
    document.getElementById('lbcount').textContent=(_lbIdx+1)+' / '+_lbSrcs.length;
    var prev=document.querySelector('#lbox .lbnav.prev'),next=document.querySelector('#lbox .lbnav.next');
    if(prev)prev.style.display=_lbSrcs.length>1?'grid':'none';
    if(next)next.style.display=_lbSrcs.length>1?'grid':'none';
  }
  function lbNav(d){_lbIdx=(_lbIdx+d+_lbSrcs.length)%_lbSrcs.length;_lbShow();}
  function closeLightbox(){document.getElementById('lbox').classList.remove('open');document.removeEventListener('keydown',lbKey);}
  function lbKey(e){if(e.key==='ArrowRight')lbNav(1);else if(e.key==='ArrowLeft')lbNav(-1);else if(e.key==='Escape')closeLightbox();}
  // swipe support
  (function(){var sx=0;var lb=document.getElementById('lbox');if(!lb)return;lb.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;},{passive:true});lb.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>50)lbNav(dx<0?1:-1);});})();

  // === LINK CLICK COUNTER ===
  (function(){
    var STORE_KEY='swag_clicks';
    function getClicks(){try{return JSON.parse(localStorage.getItem(STORE_KEY)||'{}');}catch(e){return {};}}
    function trackClick(url){var c=getClicks();c[url]=(c[url]||0)+1;try{localStorage.setItem(STORE_KEY,JSON.stringify(c));}catch(e){}}
    document.addEventListener('click',function(e){
      var a=e.target.closest('a.link');
      if(a&&a.href&&!a.href.includes('#')){trackClick(a.getAttribute('href')||a.href);}
    });
    window._getClickStats=function(){return getClicks();};
  })();

  // === WHATSAPP BUTTON — show if whatsapp link exists in cfg ===
  (function(){
    function showWA(cfg){
      var waLink=(cfg.socials||[]).find(function(s){return s.icon==='whatsapp';});
      if(!waLink)waLink=(cfg.links||[]).find(function(l){return l.icon==='whatsapp';});
      var btn=document.getElementById('waBtn');
      if(!btn)return;
      if(waLink&&waLink.url){btn.href=waLink.url;btn.style.display='flex';}
      else{btn.style.display='none';}
    }
    var origRender=window.render;
    window.render=function(cfg){origRender(cfg);showWA(cfg);};
    setTimeout(function(){if(window.CFG)showWA(window.CFG);},1800);
  })();
  </script>
  </body>
</html>
