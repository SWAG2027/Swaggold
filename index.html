<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SWAG GOLD Official</title>
<meta name="description" content="Jewellery Store — Jeddah">
<meta property="og:title" content="SWAG GOLD">
<meta property="og:description" content="Jewellery Store">
<meta name="theme-color" content="#2a1a08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{--gold:#d4a84b;--gold2:#f7ecc4;--gold3:#c9952b;--dark:#2a1a08;--radius:44px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:auto;min-height:100%}
html{scroll-behavior:smooth}
body{
  font-family:'Jost',sans-serif;color:#fff;
  min-height:100dvh;background:#2a1a08;
  display:flex;justify-content:center;align-items:flex-start;
  overflow-x:hidden;-webkit-overflow-scrolling:touch
}

/* ── BG ── */
.bg-warm{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;height:100dvh;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 30% 20%,rgba(180,90,10,.55) 0%,transparent 65%),
    radial-gradient(ellipse 60% 80% at 75% 70%,rgba(140,60,5,.45) 0%,transparent 60%),
    linear-gradient(160deg,#4a2508 0%,#2a1508 40%,#1e0f05 60%,#3e2208 100%)
}

/* ── VIDEO ── */
#cardv{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;height:100dvh;object-fit:cover;
  z-index:1;opacity:0;transition:opacity 1s ease
}
#cardv.loaded{opacity:1}

/* scrim — NO backdrop-filter (causes scroll jank) */
.scrim{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  max-width:480px;left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,
    rgba(0,0,0,.42) 0%,
    rgba(0,0,0,.04) 30%,
    rgba(0,0,0,0) 55%,
    rgba(0,0,0,.28) 100%)
}

.card{
  width:100%;max-width:480px;min-height:100dvh;
  display:flex;flex-direction:column;
  animation:fade .5s ease both;z-index:3;position:relative
}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* ── TICKER ── */
.ticker-bar{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:15;
  display:flex;align-items:center;justify-content:center;
  gap:12px;padding:7px 16px;
  background:rgba(20,10,2,.8);
  border-bottom:1px solid rgba(212,168,75,.2);
  font-size:12px;font-weight:600;letter-spacing:.04em;color:#e8d5a0;
  will-change:auto
}
.ticker-bar.hidden{display:none}
.ticker-item{display:flex;align-items:center;gap:4px;white-space:nowrap}
.ticker-item .karat{color:rgba(212,168,75,.65);font-size:10px}
.ticker-item .price{color:#f5e4a8;font-weight:700}
.ticker-item .unit{color:rgba(200,175,120,.5);font-size:10px}
.ticker-dot{width:3px;height:3px;border-radius:50%;background:rgba(212,168,75,.3)}
.ticker-time{color:rgba(200,175,120,.4);font-size:9px;margin-left:2px}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;pointer-events:none;
  transition:top .3s ease
}
.topbar>*{pointer-events:all}
.chip{
  width:42px;height:42px;border-radius:50%;
  background:rgba(30,16,4,.55);color:#fff;
  display:grid;place-items:center;text-decoration:none;
  border:1px solid rgba(212,168,75,.35);
  transition:background .2s;
  -webkit-tap-highlight-color:transparent
}
.chip:active{background:rgba(212,168,75,.25)}
.chip svg{width:18px;height:18px}
.chip .ast{font-size:20px;line-height:1;font-weight:700}

/* ── CONTENT ── */
.content{
  position:relative;z-index:2;
  padding:78px 18px 100px;width:100%
}
body.has-ticker .content{padding-top:100px}
body.has-ticker .topbar{top:34px}

/* ── LOGO ── */
.avatar-wrap{display:flex;justify-content:center}
.logo-svg-wrap{
  width:88px;height:88px;border-radius:50%;
  border:2px solid rgba(212,168,75,.55);
  background:rgba(42,26,8,.9);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 18px rgba(212,168,75,.18)
}
.logo-img{
  width:88px;height:88px;border-radius:50%;
  border:2px solid rgba(212,168,75,.55);
  object-fit:cover;display:block;
  box-shadow:0 0 18px rgba(212,168,75,.18)
}

/* ── NAME ── */
.name-row{
  display:flex;align-items:center;justify-content:center;
  gap:8px;margin-top:10px
}
.nm{
  font-family:'Cormorant Garamond',serif;font-weight:700;
  letter-spacing:.1em;font-size:clamp(26px,7vw,32px);
  text-transform:uppercase;
  background:linear-gradient(100deg,#f7ecc4 0%,#d4a84b 22%,#fff6da 42%,#c9952b 58%,#f7ecc4 82%);
  background-size:220% auto;
  -webkit-background-clip:text;background-clip:text;
  color:transparent;-webkit-text-fill-color:transparent;
  animation:shine 5s linear infinite;
  /* GPU layer for name animation only */
  will-change:background-position
}
@keyframes shine{to{background-position:220% center}}

.badge-verified{
  display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:50%;
  background:linear-gradient(135deg,#d4a84b,#f7ecc4);flex-shrink:0
}
.badge-verified svg{width:12px;height:12px;fill:#2a1a08}

.subtitle{
  text-align:center;font-size:13px;
  color:rgba(255,255,255,.62);margin-top:4px;letter-spacing:.04em
}

/* ── SOCIALS ── */
.socials{
  display:flex;gap:20px;justify-content:center;
  margin-top:14px;margin-bottom:2px
}
.soc{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.1);
  display:grid;place-items:center;text-decoration:none;
  border:1px solid rgba(212,168,75,.28);
  color:#fff;
  -webkit-tap-highlight-color:transparent;
  transition:background .2s,transform .2s
}
.soc:active{background:rgba(212,168,75,.3);transform:scale(.93)}
@media(hover:hover){.soc:hover{background:rgba(212,168,75,.22);transform:translateY(-2px)}}
.soc svg{width:20px;height:20px}

/* ── BANNER ── */
.banner{
  margin:14px 0 6px;
  background:rgba(212,168,75,.1);
  border:1px solid rgba(212,168,75,.3);
  border-radius:12px;padding:9px 14px;
  font-size:13px;color:#f5e4a8;text-align:center;
  display:none
}
.banner.show{display:block}

/* ── LINKS — GPU-accelerated, no backdrop-filter ── */
.links{display:flex;flex-direction:column;gap:10px;margin-top:16px}

.link-btn{
  display:flex;align-items:center;gap:14px;
  padding:13px 16px;border-radius:var(--radius);
  /* Solid semi-transparent bg — NO backdrop-filter */
  background:rgba(42,26,8,.65);
  border:1px solid rgba(212,168,75,.2);
  text-decoration:none;color:#fff;
  /* Only transform for hover — GPU composited, no layout */
  transition:background .2s,border-color .2s,transform .15s;
  -webkit-tap-highlight-color:transparent;
  cursor:pointer
}
.link-btn:active{
  background:rgba(212,168,75,.18);
  border-color:rgba(212,168,75,.5);
  transform:scale(.98)
}
@media(hover:hover){
  .link-btn:hover{
    background:rgba(60,36,10,.75);
    border-color:rgba(212,168,75,.45);
    transform:translateY(-2px)
  }
}

.btn-icon{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:rgba(212,168,75,.1);border:1px solid rgba(212,168,75,.25);
  display:grid;place-items:center
}
.btn-icon svg{width:20px;height:20px;color:#d4a84b}

.btn-labels{flex:1;min-width:0}
.btn-en{
  font-size:14.5px;font-weight:600;letter-spacing:.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.btn-ar{
  font-family:'Cairo',sans-serif;font-size:12px;
  color:rgba(255,255,255,.5);margin-top:1px;
  direction:rtl;white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.btn-arrow{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  display:grid;place-items:center
}
.btn-arrow svg{width:13px;height:13px;color:rgba(255,255,255,.55)}

/* ── FOOTER ── */
.footer{
  text-align:center;font-size:11px;
  color:rgba(255,255,255,.22);padding:26px 0 24px;
  letter-spacing:.06em;font-family:'Cairo',sans-serif
}

/* ── SHARE SHEET ── */
.share-overlay{
  position:fixed;inset:0;z-index:99;
  background:rgba(0,0,0,.6);
  display:none;align-items:flex-end;justify-content:center
}
.share-overlay.open{display:flex}
.share-sheet{
  width:100%;max-width:480px;
  background:linear-gradient(160deg,#3a2008,#2a1508);
  border:1px solid rgba(212,168,75,.28);
  border-radius:28px 28px 0 0;padding:26px 24px 38px;
  display:flex;flex-direction:column;gap:16px;
  animation:slideUp .28s ease
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.share-title{font-size:15px;font-weight:600;color:#f5e4a8;text-align:center}
.share-grid{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.share-item{
  display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
  background:none;border:none;color:#fff;font-size:12px;font-family:'Jost',sans-serif
}
.share-item-icon{
  width:52px;height:52px;border-radius:16px;
  background:rgba(212,168,75,.1);border:1px solid rgba(212,168,75,.28);
  display:grid;place-items:center
}
.share-item-icon svg{width:24px;height:24px;color:#d4a84b}
.share-close{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);
  color:#fff;border-radius:14px;padding:12px;font-size:14px;font-weight:500;cursor:pointer;
  font-family:'Jost',sans-serif
}

/* ── SCROLL TOP ── */
#scrollTop{
  position:fixed;bottom:24px;right:16px;z-index:50;
  width:40px;height:40px;border-radius:50%;
  background:rgba(20,10,2,.75);border:1px solid rgba(212,168,75,.38);
  display:none;place-items:center;cursor:pointer;color:#d4a84b;
  -webkit-tap-highlight-color:transparent
}
#scrollTop.show{display:grid}
#scrollTop svg{width:18px;height:18px}
</style>
</head>

  try{

    if(!r.ok)throw new Error();
    return await r.json();
  }catch(e){

      footer:'SWAG GOLD · سواج جولد',logoUrl:'',
      banner:{text:'',show:false},
      socials:[
        {icon:'tiktok',url:'https://www.tiktok.com/@swag.gold24'},

        {icon:'snapchat',url:'https://www.snapchat.com/add/swag.gold24'}
      ],
      links:[
        {icon:'google',label:'Rate us on Google',labelAr:'قيمنا على جوجل',url:'https://g.page/r/CWglyh1mAaPZEAE/review',hidden:false},

      ]

function renderConfig(cfg){
  document.getElementById('siteName').textContent=cfg.title||'SWAG GOLD';
  document.getElementById('siteSubtitle').textContent=cfg.subtitle||'Jewellery Store';
  document.getElementById('siteFooter').textContent=cfg.footer||'SWAG GOLD · سواج جولد';
  document.title=(cfg.title||'SWAG GOLD')+' Official';

  // ─ Logo: use image if provided, else keep SVG default
  if(cfg.logoUrl&&cfg.logoUrl.trim()){
    const wrap=document.getElementById('logoWrap');
    const img=document.createElement('img');
    img.src=cfg.logoUrl;
    img.alt=(cfg.title||'SWAG GOLD')+' logo';
    img.className='logo-img';
    img.width=88;img.height=88;
    img.loading='eager'; // logo loads immediately
    img.onerror=()=>{}; // silently keep SVG if image fails
    wrap.className=''; // remove svg-wrap styling
    wrap.innerHTML=''; // clear SVG
    wrap.appendChild(img);
  }

  // Banner
  const b=document.getElementById('bannerEl');
  if(cfg.banner&&cfg.banner.show&&cfg.banner.text){
    b.textContent=cfg.banner.text;b.classList.add('show');
  }

  // Socials
  const sw=document.getElementById('socialsWrap');
  sw.innerHTML='';
  (cfg.socials||[]).forEach(s=>{
    const a=document.createElement('a');
    a.href=s.url;a.target='_blank';a.rel='noopener noreferrer';
    a.className='soc';a.setAttribute('aria-label',s.icon);
    a.innerHTML=getIcon(s.icon);
    sw.appendChild(a);
  });

  // Links
  const lw=document.getElementById('linksWrap');
  lw.innerHTML='';
  (cfg.links||[]).filter(l=>!l.hidden).forEach(l=>{
    const a=document.createElement('a');
    a.href=l.url;a.target='_blank';a.rel='noopener noreferrer';
    a.className='link-btn';
    a.innerHTML=`
      <div class="btn-icon">${getIcon(l.icon)}</div>
      <div class="btn-labels">
        <div class="btn-en">${l.label||''}</div>
        ${l.labelAr?`<div class="btn-ar">${l.labelAr}</div>`:''}
      </div>
      <div class="btn-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </div>`;
    lw.appendChild(a);
  });
}

// ─ GOLD PRICE ─
async function fetchGoldPrice(){
  try{
    const r=await fetch('https://api.gold-api.com/price/XAU');
    if(!r.ok)throw 0;
    const d=await r.json();
    const g24=d.price*3.75/31.1035;
    document.getElementById('p24').textContent=g24.toFixed(1);
    document.getElementById('p21').textContent=(g24*21/24).toFixed(1);
    document.getElementById('p18').textContent=(g24*18/24).toFixed(1);
    const t=new Date();
    document.getElementById('tickerTime').textContent=
      t.toLocaleTimeString('en-SA',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('tickerBar').classList.remove('hidden');
    document.body.classList.add('has-ticker');
  }catch(e){
    document.getElementById('tickerBar').classList.add('hidden');
  }
}

// ─ SHARE ─
document.getElementById('shareBtn').onclick=()=>document.getElementById('shareOverlay').classList.add('open');
document.getElementById('shareClose').onclick=()=>document.getElementById('shareOverlay').classList.remove('open');
document.getElementById('shareOverlay').onclick=e=>{if(e.target===document.getElementById('shareOverlay'))document.getElementById('shareOverlay').classList.remove('open');};
function shareVia(t){
  const u=location.href;
  if(t==='whatsapp')window.open('https://wa.me/?text='+encodeURIComponent('SWAG GOLD 🥇\n'+u),'_blank');
  else if(t==='copy'){
    navigator.clipboard&&navigator.clipboard.writeText(u).then(()=>{
      const l=document.getElementById('copyLbl');
      l.textContent='✓ Copied!';setTimeout(()=>l.textContent='Copy Link',2000);
    });
  }else if(t==='native'&&navigator.share)navigator.share({title:'SWAG GOLD',url:u});
}

// ─ SCROLL TOP ─
const stBtn=document.getElementById('scrollTop');
window.addEventListener('scroll',()=>stBtn.classList.toggle('show',window.scrollY>280),{passive:true});
stBtn.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});

// ─ INIT ─
(async()=>{
  const cfg=await loadConfig();
  renderConfig(cfg);
  await fetchGoldPrice();
  setInterval(fetchGoldPrice,5*60*1000);
})();
</script>
