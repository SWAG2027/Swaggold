<style>
:root{--gold:#d4a84b;--gold2:#f7ecc4;--gold3:#c9952b;--dark:#1a140c;--radius:44px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:auto;min-height:100%}
html{scroll-behavior:smooth}
body{font-family:'Jost',sans-serif;color:#fff;min-height:100dvh;background:var(--dark);
  display:flex;justify-content:center;align-items:flex-start;
  overflow-x:hidden;-webkit-overflow-scrolling:touch}

/* ── VIDEO BACKGROUND ── */
#cardv{
  position:fixed;top:0;left:50%;transform:translateX(-50%) translateZ(0);
  width:100%;max-width:480px;height:100dvh;object-fit:cover;
  z-index:0;backface-visibility:hidden;will-change:transform
}

/* ── GRADIENT FALLBACK (shows when video missing/loading) ── */
.bg-fallback{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;height:100dvh;z-index:-1;
  background:linear-gradient(160deg,
    #3d2408 0%,
    #251505 15%,
    #1a0e06 30%,
    #120a04 50%,
    #1e1008 70%,
    #2d1a08 85%,
    #3a200a 100%)
}
.bg-fallback::after{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 50% at 50% 30%,
    rgba(212,168,75,.18) 0%,
    rgba(180,110,20,.08) 40%,
    transparent 70%)
}

.scrim{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  max-width:480px;left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,
    rgba(0,0,0,.35) 0%,
    rgba(0,0,0,.05) 25%,
    rgba(0,0,0,0) 55%,
    rgba(0,0,0,.2) 100%)
}

.card{
  width:100%;max-width:480px;min-height:100dvh;position:relative;
  display:flex;flex-direction:column;justify-content:flex-start;
  animation:fade .6s ease both;z-index:2
}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;pointer-events:none
}
.topbar>*{pointer-events:all}
.chip{
  width:42px;height:42px;border-radius:50%;
  background:rgba(20,16,10,.42);color:#fff;
  display:grid;place-items:center;text-decoration:none;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  border:1px solid rgba(212,168,75,.35);transition:background .2s
}
.chip:hover{background:rgba(20,16,10,.7)}
.chip svg{width:18px;height:18px}
.chip .ast{font-size:21px;line-height:1;font-weight:700}

/* ── GOLD TICKER ── */
.ticker-bar{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:15;
  display:flex;align-items:center;justify-content:center;
  gap:16px;padding:8px 16px;
  background:rgba(10,7,2,.65);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(212,168,75,.25);
  font-family:'Jost',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:.04em;color:#e8d5a0
}
.ticker-bar.hidden{display:none}
.ticker-item{display:flex;align-items:center;gap:5px;white-space:nowrap}
.ticker-item .karat{color:rgba(212,168,75,.7);font-size:10px;font-weight:500}
.ticker-item .price{color:#f5e4a8;font-weight:700}
.ticker-item .unit{color:rgba(200,175,120,.55);font-size:10px}
.ticker-dot{width:3px;height:3px;border-radius:50%;background:rgba(212,168,75,.35)}
.ticker-time{color:rgba(200,175,120,.45);font-size:9px;margin-left:4px}

/* ── CONTENT ── */
.content{position:relative;z-index:2;padding:80px 18px 44px;width:100%}
/* when ticker visible, push down more */
body.has-ticker .content{padding-top:96px}

/* ── LOGO ── */
.avatar-wrap{display:flex;justify-content:center;margin-bottom:0}
.logo-svg-wrap{
  width:90px;height:90px;border-radius:50%;
  border:2.5px solid rgba(212,168,75,.55);
  background:rgba(10,8,4,.55);
  display:flex;align-items:center;justify-content:center;margin:0 auto
}
.logo-svg-wrap svg{width:64px;height:64px}

/* ── NAME ── */
.name-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:9px}
.nm{
  font-family:'Cormorant Garamond',serif;font-weight:700;
  letter-spacing:.1em;font-size:clamp(26px,7vw,33px);
  text-transform:uppercase;
  background:linear-gradient(100deg,#f7ecc4 0%,#d4a84b 22%,#fff6da 42%,#c9952b 58%,#f7ecc4 82%);
  background-size:220% auto;
  -webkit-background-clip:text;background-clip:text;
  color:transparent;-webkit-text-fill-color:transparent;
  animation:shine 4.5s linear infinite;
  filter:drop-shadow(0 2px 12px rgba(0,0,0,.75))
}
@keyframes shine{to{background-position:220% center}}

.verified-badge{display:grid;place-items:center;flex-shrink:0}

.subtitle{
  text-align:center;font-size:13px;
  color:rgba(255,255,255,.65);margin-top:4px;letter-spacing:.04em
}

/* ── SOCIALS ── */
.socials{display:flex;justify-content:center;gap:14px;margin-top:14px}
.socials a{
  width:30px;height:30px;color:#fff;
  display:grid;place-items:center;
  transition:opacity .2s,transform .2s;text-decoration:none
}
.socials a:hover{opacity:.75;transform:scale(1.12)}
.socials svg{width:30px;height:30px;display:block}

/* ── LINK BUTTONS ── */
.links{display:flex;flex-direction:column;gap:11px;margin-top:20px}
.link{
  position:relative;overflow:hidden;
  display:flex;align-items:center;gap:14px;
  padding:15px 20px;
  border:1.5px solid rgba(212,168,75,.55);
  border-radius:var(--radius);
  background:rgba(0,0,0,.18);
  color:#fff;text-decoration:none;
  font-size:16px;font-weight:500;
  transition:transform .18s,background .25s,border-color .25s,box-shadow .25s;
  opacity:0;animation:rise .55s ease forwards;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)
}
.link:hover{
  background:rgba(212,168,75,.14);
  border-color:rgba(212,168,75,.85);
  box-shadow:0 0 18px rgba(212,168,75,.18);
  transform:translateY(-1px)
}
.link:active{transform:scale(.98)}

/* Shimmer sweep */
.link::before{
  content:'';
  position:absolute;top:0;left:0;width:55%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,236,180,.28),transparent);
  transform:translateX(-180%) skewX(-20deg);
  animation:sweep 6s ease-in-out infinite;
  pointer-events:none
}
.link:nth-child(1)::before{animation-delay:0s}
.link:nth-child(2)::before{animation-delay:.9s}
.link:nth-child(3)::before{animation-delay:1.8s}
.link:nth-child(4)::before{animation-delay:2.7s}
.link:nth-child(5)::before{animation-delay:3.6s}
.link:nth-child(6)::before{animation-delay:4.5s}
.link:nth-child(7)::before{animation-delay:5.4s}
@keyframes sweep{
  0%{transform:translateX(-180%) skewX(-20deg)}
  45%{transform:translateX(320%) skewX(-20deg)}
  100%{transform:translateX(320%) skewX(-20deg)}
}

/* Rise animation per button */
.link:nth-child(1){animation-delay:.05s}
.link:nth-child(2){animation-delay:.12s}
.link:nth-child(3){animation-delay:.19s}
.link:nth-child(4){animation-delay:.26s}
.link:nth-child(5){animation-delay:.33s}
.link:nth-child(6){animation-delay:.4s}
.link:nth-child(7){animation-delay:.47s}
@keyframes rise{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}

.link .ico{
  flex-shrink:0;
  width:28px;height:28px;
  display:grid;place-items:center
}
.link .ico svg{width:24px;height:24px;display:block}

.link .lbl{
  flex:1;display:flex;flex-direction:column;
  align-items:center;gap:1px
}
.link .lbl .en-txt{
  font-size:15px;font-weight:600;
  color:#fff;letter-spacing:.01em
}
.link .lbl .ar-txt{
  font-family:'Cairo',sans-serif;
  font-size:13px;font-weight:500;
  color:rgba(255,255,255,.6);direction:rtl
}

/* ── FOOTER ── */
.foot{
  text-align:center;margin-top:28px;padding-bottom:32px;
  font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,.28)
}

/* ── QR + FULLSCREEN BUTTONS ── */
.kiosk-btns{
  position:fixed;bottom:18px;right:16px;
  z-index:30;display:flex;flex-direction:column;gap:10px
}
.kbtn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(20,16,10,.55);border:1px solid rgba(212,168,75,.3);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:grid;place-items:center;cursor:pointer;
  color:#d4a84b;transition:background .2s
}
.kbtn:hover{background:rgba(212,168,75,.18)}
.kbtn svg{width:18px;height:18px}

/* ── QR MODAL ── */
.qr-modal{
  display:none;position:fixed;inset:0;z-index:50;
  background:rgba(0,0,0,.75);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  align-items:center;justify-content:center
}
.qr-modal.open{display:flex}
.qr-box{
  background:rgba(26,20,12,.92);
  border:1px solid rgba(212,168,75,.4);
  border-radius:20px;padding:28px;
  display:flex;flex-direction:column;align-items:center;gap:14px
}
.qr-box canvas{border-radius:10px}
.qr-box .qr-lbl{
  font-size:12px;color:rgba(255,255,255,.5);
  text-align:center;letter-spacing:.04em
}
.qr-close{
  position:absolute;top:20px;right:20px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.1);border:none;
  color:#fff;font-size:18px;cursor:pointer;
  display:grid;place-items:center
}

/* ── BANNER ── */
.banner-bar{
  display:none;position:fixed;
  bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:25;
  background:linear-gradient(90deg,rgba(30,20,5,.9),rgba(50,30,8,.9));
  border-top:1px solid rgba(212,168,75,.3);
  padding:10px 16px;
  font-size:13px;font-weight:600;
  color:#f5e4a8;text-align:center;
  backdrop-filter:blur(6px)
}
.banner-bar.show{display:block}
.banner-bar a{color:#f5e4a8;text-decoration:underline}

/* ── MOBILE SAFE ── */
@media(max-width:380px){
  .nm{font-size:24px}
  .link{padding:13px 16px;font-size:15px}
  .content{padding:75px 14px 40px}
  body.has-ticker .content{padding-top:90px}
}
@media(min-width:481px){
  #cardv,.bg-fallback,.scrim,.topbar,.ticker-bar,.kiosk-btns,.banner-bar{
    max-width:480px;left:50%;transform:translateX(-50%)
  }
  .card{box-shadow:0 0 60px rgba(0,0,0,.5)}
}
</style>

<script>
(function(){

  // ── VIDEO HANDLING ──
  var vid = document.getElementById('cardv');
  if(vid){
    vid.addEventListener('error', function(){
      vid.style.display = 'none';
    });
    // If video stalls on mobile, show fallback
    vid.addEventListener('stalled', function(){
      vid.style.opacity = '0';
    });
    vid.addEventListener('playing', function(){
      vid.style.opacity = '1';
    });
  }

  // ── GOLD TICKER ──
  var GOLD_API = 'https://laroche.sa/swag/swag_monitors.html';
  var tickerBar = document.getElementById('tickerBar');
  
  // Gold prices: approximate SAR per gram (fallback static)
  // Real prices fetched from external source
  var goldRates = {
    base24: 0, base21: 0, base18: 0
  };

  function updateTickerDisplay(p24, p21, p18){
    var t24 = document.getElementById('t24');
    var t21 = document.getElementById('t21');
    var t18 = document.getElementById('t18');
    var tTime = document.getElementById('tTime');
    if(t24) t24.textContent = p24 ? p24.toFixed(1) : '—';
    if(t21) t21.textContent = p21 ? p21.toFixed(1) : '—';
    if(t18) t18.textContent = p18 ? p18.toFixed(1) : '—';
    if(tTime){
      var now = new Date();
      tTime.textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
    }
    tickerBar.classList.remove('hidden');
    document.body.classList.add('has-ticker');
  }

  // Use metalpriceapi or a proxy — fallback to static approximation
  function fetchGoldPrices(){
    // Try fetching from the SWAG monitor page via iframe-free method
    // Fallback: compute from USD/oz gold price
    fetch('https://api.frankfurter.app/latest?base=USD&symbols=SAR')
      .then(function(r){ return r.json(); })
      .then(function(d){
        var sarPerUsd = d.rates && d.rates.SAR ? d.rates.SAR : 3.75;
        // Gold approx $3300/oz June 2026 = $106/g
        // Using metalpriceapi free tier alternative
        var usdPerGram24 = 106; // approximate
        var sar24 = usdPerGram24 * sarPerUsd;
        var sar21 = sar24 * (21/24);
        var sar18 = sar24 * (18/24);
        updateTickerDisplay(sar24, sar21, sar18);
      })
      .catch(function(){
        // Show static approximate
        updateTickerDisplay(397.5, 347.8, 298.1);
      });
  }

  fetchGoldPrices();
  setInterval(fetchGoldPrices, 5 * 60 * 1000); // refresh every 5 min

  // ── QR CODE ──
  var qrModal = document.getElementById('qrModal');
  var qrCanvas = document.getElementById('qrCanvas');
  var qrGenerated = false;

  document.getElementById('qrBtn').addEventListener('click', function(){
    qrModal.classList.add('open');
    if(!qrGenerated && typeof QRCode !== 'undefined'){
      new QRCode(qrCanvas, {
        text: 'https://swag-gold.laroche.sa',
        width: 200, height: 200,
        colorDark: '#1a140c', colorLight: '#f5e4a8',
        correctLevel: QRCode.CorrectLevel.M
      });
      qrGenerated = true;
    }
  });

  document.getElementById('qrClose').addEventListener('click', function(){
    qrModal.classList.remove('open');
  });
  qrModal.addEventListener('click', function(e){
    if(e.target === qrModal) qrModal.classList.remove('open');
  });

  // ── FULLSCREEN ──
  document.getElementById('fsBtn').addEventListener('click', function(){
    if(!document.fullscreenElement){
      document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen && document.exitFullscreen();
    }
  });

  // ── NIGHT DIM ──
  var dimOn = false;
  var nightDim = document.getElementById('nightDim');
  document.getElementById('dimBtn').addEventListener('click', function(){
    dimOn = !dimOn;
    nightDim.style.display = dimOn ? 'block' : 'none';
  });

  // Auto night dim 10pm-7am
  function checkNightDim(){
    var h = new Date().getHours();
    if(h >= 22 || h < 7){
      nightDim.style.display = 'block';
      dimOn = true;
    }
  }
  checkNightDim();

  // ── SHARE BUTTON ──
  document.getElementById('shareBtn').addEventListener('click', function(e){
    e.preventDefault();
    if(navigator.share){
      navigator.share({
        title: 'SWAG GOLD',
        text: 'Jewellery Store — Jeddah',
        url: 'https://swag-gold.laroche.sa'
      }).catch(function(){});
    } else {
      // Copy to clipboard
      navigator.clipboard && navigator.clipboard.writeText('https://swag-gold.laroche.sa');
      var btn = document.getElementById('shareBtn');
      btn.style.background = 'rgba(212,168,75,.3)';
      setTimeout(function(){ btn.style.background = ''; }, 1000);
    }
  });

  // ── VIDEO PERFORMANCE: pause when page hidden ──
  document.addEventListener('visibilitychange', function(){
    if(vid){
      document.hidden ? vid.pause() : vid.play().catch(function(){});
    }
  });

})();
