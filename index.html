<style>
:root{--gold:#d4a84b;--gold2:#f7ecc4;--gold3:#c9952b;--dark:#2a1a08;--radius:44px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:auto;min-height:100%}
html{scroll-behavior:smooth}
body{
  font-family:'Jost',sans-serif;color:#fff;
  min-height:100dvh;background:#2a1a08;
  display:flex;justify-content:center;align-items:flex-start;
  overflow-x:hidden;-webkit-overflow-scrolling:touch
}

/* ── WARM BACKGROUND (always visible) ── */
.bg-warm{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;height:100dvh;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 30% 20%, rgba(180,90,10,.55) 0%, transparent 65%),
    radial-gradient(ellipse 60% 80% at 75% 70%, rgba(140,60,5,.45) 0%, transparent 60%),
    radial-gradient(ellipse 90% 70% at 50% 50%, rgba(90,40,5,.3) 0%, transparent 80%),
    linear-gradient(160deg, #4a2508 0%, #3a1c06 20%, #2a1508 40%, #1e0f05 60%, #2d1808 80%, #3e2208 100%)
}
.bg-warm::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  opacity:.35;mix-blend-mode:overlay;pointer-events:none
}

/* ── VIDEO (on top of warm bg) ── */
#cardv{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;height:100dvh;object-fit:cover;
  z-index:1;opacity:0;transition:opacity 1s ease
}
#cardv.loaded{opacity:1}

.scrim{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  max-width:480px;left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,
    rgba(0,0,0,.4) 0%,
    rgba(0,0,0,.05) 30%,
    rgba(0,0,0,0) 55%,
    rgba(0,0,0,.25) 100%)
}

.card{
  width:100%;max-width:480px;min-height:100dvh;position:relative;
  display:flex;flex-direction:column;justify-content:flex-start;
  animation:fade .6s ease both;z-index:3
}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;pointer-events:none
}
.topbar>*{pointer-events:all}
.chip{
  width:42px;height:42px;border-radius:50%;
  background:rgba(30,16,4,.5);color:#fff;
  display:grid;place-items:center;text-decoration:none;
  border:1px solid rgba(212,168,75,.4);transition:background .2s
}
.chip:hover{background:rgba(30,16,4,.8)}
.chip svg{width:18px;height:18px}
.chip .ast{font-size:21px;line-height:1;font-weight:700}

/* ── GOLD TICKER ── */
.ticker-bar{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:15;
  display:flex;align-items:center;justify-content:center;
  gap:16px;padding:8px 16px;
  background:rgba(20,10,2,.72);
  border-bottom:1px solid rgba(212,168,75,.25);
  font-family:'Jost',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:.04em;color:#e8d5a0
}
.ticker-bar.hidden{display:none}
.ticker-item{display:flex;align-items:center;gap:5px;white-space:nowrap}
.ticker-item .karat{color:rgba(212,168,75,.7);font-size:10px;font-weight:500}
.ticker-item .price{color:#f5e4a8;font-weight:700}
.ticker-item .unit{color:rgba(200,175,120,.55);font-size:10px}
.ticker-dot{width:3px;height:3px;border-radius:50%;background:rgba(212,168,75,.35)}
.ticker-time{color:rgba(200,175,120,.45);font-size:9px;margin-left:4px}

/* ── CONTENT ── */
.content{position:relative;z-index:2;padding:80px 18px 44px;width:100%}
body.has-ticker .content{padding-top:96px}

/* ── LOGO ── */
.avatar-wrap{display:flex;justify-content:center;margin-bottom:0}
.logo-svg-wrap{
  width:90px;height:90px;border-radius:50%;
  border:2.5px solid rgba(212,168,75,.6);
  background:rgba(20,10,2,.6);
  display:flex;align-items:center;justify-content:center;margin:0 auto
}
.logo-img{
  width:90px;height:90px;border-radius:50%;
  border:2.5px solid rgba(212,168,75,.6);
  object-fit:cover;display:block
}

/* ── NAME ── */
.name-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:9px}
.nm{
  font-family:'Cormorant Garamond',serif;font-weight:700;
  letter-spacing:.1em;font-size:clamp(26px,7vw,33px);
  text-transform:uppercase;
  background:linear-gradient(100deg,#f7ecc4 0%,#d4a84b 22%,#fff6da 42%,#c9952b 58%,#f7ecc4 82%);
  background-size:220% auto;
  -webkit-background-clip:text;background-clip:text;
  color:transparent;-webkit-text-fill-color:transparent;
  animation:shine 4.5s linear infinite;
  filter:drop-shadow(0 2px 12px rgba(0,0,0,.75))
}
@keyframes shine{to{background-position:220% center}}

.subtitle{
  text-align:center;font-size:13px;
  color:rgba(255,255,255,.65);margin-top:4px;letter-spacing:.04em
}

/* ── SOCIALS ── */
.socials{display:flex;justify-content:center;gap:14px;margin-top:14px}
.socials a{
  width:30px;height:30px;color:#fff;
  display:grid;place-items:center;
  transition:opacity .2s,transform .2s;text-decoration:none
}
.socials a:hover{opacity:.75;transform:scale(1.12)}
.socials svg{width:30px;height:30px;display:block}

/* ── LINK BUTTONS ── */
/* NO backdrop-filter on links = much smoother scroll */
.links{display:flex;flex-direction:column;gap:11px;margin-top:20px}
.link{
  position:relative;overflow:hidden;
  display:flex;align-items:center;gap:14px;
  padding:15px 20px;
  border:1.5px solid rgba(212,168,75,.5);
  border-radius:var(--radius);
  background:rgba(30,15,3,.45);
  color:#fff;text-decoration:none;
  font-size:16px;font-weight:500;
  transition:transform .18s ease,background .2s ease,border-color .2s ease,box-shadow .2s ease;
  opacity:0;animation:rise .55s ease forwards;
  /* removed backdrop-filter — was causing scroll lag */
}
.link:hover{
  background:rgba(212,168,75,.15);
  border-color:rgba(212,168,75,.85);
  box-shadow:0 0 18px rgba(212,168,75,.18);
  transform:translateY(-1px)
}
.link:active{transform:scale(.98)}

/* Shimmer sweep */
.link::before{
  content:'';
  position:absolute;top:0;left:0;width:55%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,236,180,.25),transparent);
  transform:translateX(-180%) skewX(-20deg);
  animation:sweep 6s ease-in-out infinite;
  pointer-events:none
}
.link:nth-child(1)::before{animation-delay:0s}
.link:nth-child(2)::before{animation-delay:.9s}
.link:nth-child(3)::before{animation-delay:1.8s}
.link:nth-child(4)::before{animation-delay:2.7s}
.link:nth-child(5)::before{animation-delay:3.6s}
.link:nth-child(6)::before{animation-delay:4.5s}
.link:nth-child(7)::before{animation-delay:5.4s}
@keyframes sweep{
  0%{transform:translateX(-180%) skewX(-20deg)}
  45%{transform:translateX(320%) skewX(-20deg)}
  100%{transform:translateX(320%) skewX(-20deg)}
}

.link:nth-child(1){animation-delay:.05s}
.link:nth-child(2){animation-delay:.12s}
.link:nth-child(3){animation-delay:.19s}
.link:nth-child(4){animation-delay:.26s}
.link:nth-child(5){animation-delay:.33s}
.link:nth-child(6){animation-delay:.4s}
.link:nth-child(7){animation-delay:.47s}
@keyframes rise{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}

.link .ico{
  flex-shrink:0;
  width:28px;height:28px;
  display:grid;place-items:center
}
.link .ico svg{width:24px;height:24px;display:block}

.link .lbl{
  flex:1;display:flex;flex-direction:column;
  align-items:center;gap:1px
}
.link .lbl .en-txt{
  font-size:15px;font-weight:600;
  color:#fff;letter-spacing:.01em
}
.link .lbl .ar-txt{
  font-family:'Cairo',sans-serif;
  font-size:13px;font-weight:500;
  color:rgba(255,255,255,.6);direction:rtl
}

/* ── FOOTER ── */
.foot{
  text-align:center;margin-top:28px;padding-bottom:32px;
  font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,.28)
}

/* ── KIOSK BUTTONS ── */
.kiosk-btns{
  position:fixed;bottom:18px;right:16px;
  z-index:30;display:flex;flex-direction:column;gap:10px
}
.kbtn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(30,15,3,.6);border:1px solid rgba(212,168,75,.3);
  display:grid;place-items:center;cursor:pointer;
  color:#d4a84b;transition:background .2s
}
.kbtn:hover{background:rgba(212,168,75,.2)}
.kbtn svg{width:18px;height:18px}

/* ── QR MODAL ── */
.qr-modal{
  display:none;position:fixed;inset:0;z-index:50;
  background:rgba(0,0,0,.78);
  align-items:center;justify-content:center
}
.qr-modal.open{display:flex}
.qr-box{
  background:rgba(30,18,5,.95);
  border:1px solid rgba(212,168,75,.4);
  border-radius:20px;padding:28px;
  display:flex;flex-direction:column;align-items:center;gap:14px
}
.qr-box canvas{border-radius:10px}
.qr-box .qr-lbl{font-size:12px;color:rgba(255,255,255,.5);text-align:center;letter-spacing:.04em}
.qr-close{
  position:absolute;top:20px;right:20px;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.12);border:none;
  color:#fff;font-size:18px;cursor:pointer;
  display:grid;place-items:center
}

/* ── BANNER ── */
.banner-bar{
  display:none;position:fixed;
  bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:25;
  background:linear-gradient(90deg,rgba(40,22,5,.92),rgba(60,32,8,.92));
  border-top:1px solid rgba(212,168,75,.3);
  padding:10px 16px;
  font-size:13px;font-weight:600;
  color:#f5e4a8;text-align:center
}
.banner-bar.show{display:block}

/* ── MOBILE ── */
@media(max-width:380px){
  .nm{font-size:24px}
  .link{padding:13px 16px;font-size:15px}
  .content{padding:75px 14px 40px}
  body.has-ticker .content{padding-top:90px}
}
@media(min-width:481px){
  .bg-warm,#cardv,.scrim,.topbar,.ticker-bar,.kiosk-btns,.banner-bar{
    max-width:480px;left:50%;transform:translateX(-50%)
  }
  .card{box-shadow:0 0 60px rgba(0,0,0,.5)}
}
</style>

  if(el24) el24.textContent = p24.toFixed(1);

  document.body.classList.add('has-ticker');
}

      showTicker(g24, g24*(21/24), g24*(18/24));
    })
    .catch(function(){ showTicker(397.5, 347.8, 298.1); });
