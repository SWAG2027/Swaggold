<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SWAG GOLD Official: TikTok, Instagram</title>
<meta name="description" content="Jewellery Store - SWAG GOLD Jeddah">
<meta property="og:title" content="SWAG GOLD Official">
<meta property="og:description" content="Jewellery Store">
<meta name="theme-color" content="#1a140c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SWAG GOLD">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Cairo:wght@500;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--radius:22px;--gold:#d4a84b;--gold2:#e7c873;--dark:#1a140c}
*{box-sizing:border-box;margin:0;padding:0}

html{
  height:100%;
  -webkit-text-size-adjust:100%;
}

body{
  font-family:'Jost',sans-serif;
  color:#fff;
  min-height:100%;
  background:#1a140c;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:0;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  overscroll-behavior-y:none;
}

/* ═══════════════════════════════════════
   DESKTOP blurred backdrop
═══════════════════════════════════════ */
.backdrop{
  display:none;
  position:fixed;inset:0;z-index:-2;
  overflow:hidden;background:#1a140c
}
.backdrop video{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(1.25);
  min-width:100%;min-height:100%;
  object-fit:cover;
  filter:blur(34px) brightness(.5) saturate(1.1)
}
.backdrop::after{
  content:"";position:absolute;inset:0;
  background:rgba(20,15,8,.35)
}
@media(min-width:520px){.backdrop{display:block}}

/* ═══════════════════════════════════════
   CARD
═══════════════════════════════════════ */
.card{
  width:100%;max-width:480px;
  min-height:100dvh;
  position:relative;
  display:flex;flex-direction:column;
  justify-content:flex-start;
  animation:fade .6s ease both
}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* ═══════════════════════════════════════
   VIDEO — ALL SCREENS
   KEY: position:fixed + translate3d = GPU layer, no scroll jank
   Card content scrolls on top; video stays fixed behind.
═══════════════════════════════════════ */
.cardvid{
  position:fixed;
  left:50%;
  top:0;
  /* translate3d forces GPU compositing layer */
  transform:translate3d(-50%,0,0);
  width:100vw;
  max-width:480px;
  height:100dvh;
  object-fit:cover;
  z-index:-1;
  /* GPU-only properties — never triggers layout or paint */
  will-change:transform;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}

/* hide the old mobile static image — video handles everything now */
.card-bg-img{display:none!important}

.scrim{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  top:0;
  width:100%;
  max-width:480px;
  height:100dvh;
  z-index:0;
  pointer-events:none;
  background:linear-gradient(
    180deg,
    rgba(0,0,0,.30) 0%,
    rgba(0,0,0,.02) 18%,
    rgba(0,0,0,0) 45%,
    rgba(0,0,0,.06) 70%,
    rgba(0,0,0,.32) 100%
  );
}

.content{
  position:relative;
  z-index:2;
  padding:20px 16px 52px;
  width:100%;
}

/* ── TOP BAR ── */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px
}
.chip{
  width:42px;height:42px;
  border-radius:50%;
  background:rgba(20,16,10,.60);
  color:#fff;
  display:grid;place-items:center;
  text-decoration:none;
  border:1px solid rgba(255,255,255,.22);
  transition:transform .2s;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.chip:hover{transform:scale(1.08)}
.chip svg{width:18px;height:18px}
.chip .ast{font-size:21px;line-height:1;font-weight:700}

/* ── PRICE TICKER ── */
.ticker{
  background:rgba(0,0,0,.45);
  border:1px solid rgba(212,168,75,.4);
  border-radius:10px;
  padding:5px 12px;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:11.5px;
  font-weight:600;
  letter-spacing:.03em;
  overflow:hidden;
  min-height:34px
}
.ticker-icon{font-size:14px}
.ticker-items{display:flex;gap:18px;align-items:center;flex-wrap:nowrap}
.ti{display:flex;align-items:center;gap:5px;white-space:nowrap}
.ti-label{color:rgba(255,255,255,.6);font-size:10px;letter-spacing:.06em}
.ti-val{color:#e7c873;font-variant-numeric:tabular-nums}
.ti-unit{color:rgba(255,255,255,.5);font-size:10px}
.ti-time{color:rgba(255,255,255,.4);font-size:10px;margin-left:4px}

/* ── PROFILE ── */
.profile{
  display:flex;flex-direction:column;
  align-items:center;text-align:center;
  margin-top:8px
}
.avatar{
  width:90px;height:90px;
  border-radius:50%;
  object-fit:cover;
  background:#000;
  box-shadow:0 10px 30px rgba(0,0,0,.6);
  display:block;
}
.name{
  display:flex;align-items:center;
  justify-content:center;gap:8px;
  margin-top:9px
}
.nm{
  font-family:'Cormorant Garamond',serif;
  font-weight:700;
  letter-spacing:.1em;
  font-size:33px;
  text-transform:uppercase;
  background:linear-gradient(100deg,#f7ecc4 0%,#d4a84b 22%,#fff6da 42%,#c9952b 58%,#f7ecc4 82%);
  background-size:220% auto;
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;
  animation:shine 4.5s linear infinite;
  filter:drop-shadow(0 2px 12px rgba(0,0,0,.75))
}
@keyframes shine{to{background-position:220% center}}
.verified{display:grid;place-items:center;filter:drop-shadow(0 2px 6px rgba(0,0,0,.55))}
.verified svg{width:24px;height:24px;display:block}
.bio{
  margin-top:2px;
  font-size:14px;
  font-weight:600;
  letter-spacing:.02em;
  color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,.85)
}

/* ── SOCIALS ── */
.socials{
  display:flex;justify-content:center;
  gap:16px;margin:11px 0 0
}
.socials a{
  width:30px;height:30px;
  color:#fff;
  display:grid;place-items:center;
  transition:transform .2s;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.55));
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.socials a:hover{transform:translateY(-3px) scale(1.1)}
.socials svg{width:30px;height:30px;display:block}

/* ── BANNER ── */
.banner{
  margin:8px 0 2px;
  padding:9px 34px 9px 14px;
  border-radius:12px;
  background:linear-gradient(90deg,rgba(212,168,75,.26),rgba(212,168,75,.10));
  border:1px solid rgba(212,168,75,.55);
  color:#fbeec2;
  font-size:13.5px;
  text-align:center;
  font-weight:600;
  letter-spacing:.01em;
  position:relative
}
.banner a{color:#fff;text-decoration:underline}
.banner-close{
  position:absolute;right:10px;top:50%;
  transform:translateY(-50%);
  background:none;border:none;
  color:rgba(255,255,255,.5);
  font-size:16px;cursor:pointer;
  line-height:1;padding:2px
}

/* ═══════════════════════════════════════
   LINK BUTTONS
═══════════════════════════════════════ */
.links{
  margin-top:14px;
  display:grid;
  grid-template-columns:repeat(var(--cols,1),minmax(0,1fr));
  gap:var(--gap,10px);
}
.link{
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 16px;
  border:1.5px solid rgba(212,168,75,.60);
  border-radius:var(--radius);
  background:rgba(0,0,0,.16);
  color:#fff;
  text-decoration:none;
  font-size:15px;
  font-weight:500;
  min-height:58px;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

/* Entrance animation */
.link{
  opacity:0;
  animation:rise .5s ease forwards;
}
@keyframes rise{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:none}
}
.link:nth-child(1){animation-delay:.04s}
.link:nth-child(2){animation-delay:.10s}
.link:nth-child(3){animation-delay:.16s}
.link:nth-child(4){animation-delay:.22s}
.link:nth-child(5){animation-delay:.28s}
.link:nth-child(6){animation-delay:.34s}
.link:nth-child(7){animation-delay:.40s}

/* Gold shimmer — DESKTOP ONLY */
@media(hover:hover){
  .link::before{
    content:"";
    position:absolute;top:0;left:0;
    width:55%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,236,180,.28),transparent);
    transform:translateX(-180%) skewX(-20deg);
    animation:sweep 6s ease-in-out infinite;
    pointer-events:none;
  }
  .link:nth-child(2)::before{animation-delay:.8s}
  .link:nth-child(3)::before{animation-delay:1.6s}
  .link:nth-child(4)::before{animation-delay:2.4s}
  .link:nth-child(5)::before{animation-delay:3.2s}
  .link:nth-child(6)::before{animation-delay:4s}
  .link:nth-child(7)::before{animation-delay:4.8s}
  @keyframes sweep{
    0%{transform:translateX(-180%) skewX(-20deg)}
    45%{transform:translateX(320%) skewX(-20deg)}
    100%{transform:translateX(320%) skewX(-20deg)}
  }
  .link:hover{
    transform:translateY(-2px);
    background:rgba(212,168,75,.18);
    border-color:#e7c873;
    box-shadow:0 0 0 1px rgba(212,168,75,.4),0 12px 30px rgba(180,140,40,.35);
    transition:transform .18s,background .25s,border-color .25s,box-shadow .25s;
  }
}

/* Mobile active state */
@media(hover:none){
  .link:active{
    background:rgba(212,168,75,.25);
    border-color:rgba(212,168,75,.9);
    transform:scale(0.97);
  }
}

.link.featured{
  box-shadow:0 0 0 1.5px var(--gold),0 8px 28px rgba(212,168,75,.38);
  background:linear-gradient(180deg,rgba(212,168,75,.20),rgba(0,0,0,.16))
}

.link .ico{
  flex:0 0 28px;
  display:grid;place-items:center;
  color:#fff;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,.7))
}
.link .ico svg{width:28px;height:28px;display:block}
.link .label{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  line-height:1.3;
  text-shadow:0 1px 6px rgba(0,0,0,.85);
  text-align:center
}
.link .dash{opacity:.6}
.link .ar{font-family:'Cairo',sans-serif;font-weight:600}
.link .dots{
  flex:0 0 20px;
  color:#fff;
  opacity:.45;
  display:grid;place-items:center
}
.link .dots svg{width:18px;height:18px}

/* ── FOOTER ── */
.footer{
  margin-top:14px;
  text-align:center;
  font-size:10px;
  letter-spacing:.22em;
  opacity:.7;
  text-transform:uppercase;
  text-shadow:0 1px 7px rgba(0,0,0,.85)
}

/* ── KIOSK CONTROLS ── */
.kiosk{
  position:fixed;bottom:16px;right:16px;
  display:flex;gap:10px;z-index:50
}
.kbtn{
  width:48px;height:48px;
  border-radius:50%;
  border:1px solid rgba(212,168,75,.6);
  background:rgba(20,16,10,.72);
  color:#e7c873;
  font-size:13px;font-weight:700;
  cursor:pointer;
  display:grid;place-items:center;
  transition:transform .2s;
  letter-spacing:.04em;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.kbtn:hover{transform:scale(1.08)}
.kbtn svg{
  width:22px;height:22px;
  fill:none;stroke:#e7c873;
  stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round
}

/* ── QR OVERLAY ── */
.qrov{
  display:none;
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.80);
  align-items:center;justify-content:center;
  padding:24px
}
.qrov.open{display:flex}
.qrcard{
  background:#fff;
  border-radius:26px;
  padding:28px 26px 22px;
  position:relative;
  text-align:center;
  box-shadow:0 24px 70px rgba(0,0,0,.55);
  max-width:340px;width:100%;
  animation:rise .4s ease
}
.qrcard .qbadge{
  width:54px;height:54px;
  border-radius:50%;
  margin:-52px auto 8px;
  display:block;
  box-shadow:0 6px 18px rgba(0,0,0,.3);
  border:3px solid #fff
}
.qrbox{width:236px;height:236px;margin:6px auto 0;display:grid;place-items:center}
.qrbox svg{width:236px;height:236px}
.qrt{
  margin-top:16px;
  color:#1a140c;
  font-family:'Cairo',sans-serif;
  font-weight:700;
  font-size:18px;
  line-height:1.5
}
.qrt span{
  display:block;
  font-family:'Jost',sans-serif;
  font-weight:500;
  font-size:13px;
  color:#8a7636;
  letter-spacing:.04em
}
.qrclose{
  position:absolute;top:12px;right:14px;
  border:none;background:none;
  font-size:20px;color:#bbb;
  cursor:pointer;line-height:1
}

/* ── LIGHTBOX ── */
#lbox{
  display:none;
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.92);
  align-items:center;justify-content:center;
  padding:0
}
#lbox.open{display:flex}
#lbox img{
  max-width:96vw;max-height:88vh;
  object-fit:contain;
  border-radius:12px;
  box-shadow:0 8px 40px rgba(0,0,0,.8);
  user-select:none
}
#lbox .lbclose{
  position:absolute;top:14px;right:18px;
  font-size:28px;color:#fff;
  cursor:pointer;line-height:1;z-index:201;
  opacity:.85;
  background:rgba(0,0,0,.4);
  border-radius:50%;
  width:38px;height:38px;
  display:grid;place-items:center
}
#lbox .lbnav{
  position:absolute;top:50%;
  transform:translateY(-50%);
  width:42px;height:42px;
  border-radius:50%;
  background:rgba(0,0,0,.5);
  color:#fff;font-size:22px;
  display:grid;place-items:center;
  cursor:pointer;z-index:201;
  border:none
}
#lbox .lbnav.prev{left:10px}
#lbox .lbnav.next{right:10px}
#lbox .lbcount{
  position:absolute;bottom:14px;left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,.7);
  font-size:12px;letter-spacing:.1em
}

/* ── REDUCED MOTION ── */
@media(prefers-reduced-motion:reduce){
  .link::before{animation:none}
  .nm{animation:none}
  .link{animation:none;opacity:1}
}

/* ── SMALL PHONE ── */
@media(max-width:380px){
  .nm{font-size:28px}
  .link{font-size:14px;padding:12px 14px}
}
</style>
</head>

<!-- Lightbox -->
<div id="lbox" onclick="closeLB()">

  <div class="lbcount" id="lbcount"></div>
</div>

// ── GOLD PRICE ──
let priceData = {};
async function fetchGoldPrice() {
  try {
    const r = await fetch('https://data-asg.goldprice.org/dbXRates/SAR');
    const d = await r.json();
    const usd = d.price || 0;
    const sar = usd * (d.xrates?.SAR || 3.75);
    const g = sar / 31.1035;
    priceData = {
      k24: (g * 1).toFixed(1),
      k21: (g * 0.875).toFixed(1),
      k18: (g * 0.75).toFixed(1),
      time: new Date().toLocaleTimeString('en-SA',{hour:'2-digit',minute:'2-digit'})
    };
  } catch(e) {}
  renderTicker();
}

function renderTicker() {
  const el = document.getElementById('ticker');
  if (!el) return;
  const t = priceData;
  if (!t.k24) { el.innerHTML = `<span class="ticker-icon">🥇</span><span style="opacity:.6;font-size:11px">Loading prices…</span>`; return; }
  el.innerHTML = `
    <span class="ticker-icon">🥇</span>
    <div class="ticker-items">
      <div class="ti"><span class="ti-label">24K</span><span class="ti-val">${t.k24}</span><span class="ti-unit">SAR/g</span></div>
      <div class="ti"><span class="ti-label">21K</span><span class="ti-val">${t.k21}</span><span class="ti-unit">SAR/g</span></div>
      <div class="ti"><span class="ti-label">18K</span><span class="ti-val">${t.k18}</span><span class="ti-unit">SAR/g</span></div>
      <span class="ti-time">${t.time}</span>
    </div>`;
}

// ── MAIN RENDER ──
function render(cfg) {
  const c = document.getElementById('content');
  if (!c) return;

  // VIDEO — all screens, smooth GPU layer
  const cardv = document.getElementById('cardv');
  const vsrc  = document.getElementById('vsrc');
  const bgv   = document.getElementById('bgv');

  if (cfg.video) {
    if (vsrc && vsrc.src !== cfg.video) {
      vsrc.src = cfg.video;
      if (cardv) { cardv.load(); cardv.play().catch(()=>{}); }
    }
    // Desktop blurred backdrop
    if (bgv && !bgv.src) {
      bgv.src = cfg.video;
      bgv.load();
      bgv.play().catch(()=>{});
    }
  }

  // Banner
  let bannerHTML = '';
  if (cfg.banner?.show && cfg.banner?.text) {
    bannerHTML = `<div class="banner" id="bnr">${cfg.banner.text}<button class="banner-close" onclick="document.getElementById('bnr').remove()">&#10005;</button></div>`;
  }

  // Social icons
  const socialsHTML = (cfg.socials || []).map(s =>
    `<a href="${s.url}" target="_blank" rel="noopener" aria-label="${s.icon}">${ICONS[s.icon]||''}</a>`
  ).join('');

  // Link buttons
  const linksHTML = (cfg.links || []).filter(l => !l.hidden).map(l => {
    const featured = l.featured ? ' featured' : '';
    const arLabel = l.labelAr ? `<span class="dash">-</span><span class="ar">${l.labelAr}</span>` : '';
    return `<a href="${l.url}" target="_blank" rel="noopener" class="link${featured}">
      <span class="ico">${ICONS[l.icon]||''}</span>
      <span class="label"><span>${l.label}</span>${arLabel}</span>
      <span class="dots">${ICONS.menu}</span>
    </a>`;
  }).join('');

  const logoHTML = cfg.logoUrl
    ? `<img class="avatar" src="${cfg.logoUrl}" alt="${cfg.title}" width="90" height="90" loading="eager">`
    : `<div class="avatar" style="display:grid;place-items:center;font-size:28px">💛</div>`;

  c.innerHTML = `
    <div class="topbar">
      <button class="chip" onclick="window.location.reload()" aria-label="Refresh">
        <span class="ast">✳</span>
      </button>
      <button class="chip" onclick="doShare()" aria-label="Share">${ICONS.share}</button>
    </div>

    <div id="ticker" class="ticker"><span class="ticker-icon">🥇</span><span style="opacity:.6;font-size:11px">Loading prices…</span></div>

    <div class="profile">
      ${logoHTML}
      <div class="name">
        <span class="nm">${cfg.title||'SWAG GOLD'}</span>
        <span class="verified">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L13.9 7.26L19.5 6.18L16.74 11.06L21 13.82L16.14 15.5L17 21L12 18.27L7 21L7.86 15.5L3 13.82L7.26 11.06L4.5 6.18L10.1 7.26Z" fill="#d4a84b" stroke="#d4a84b" stroke-width="1"/>
            <path d="M9 12l2 2 4-4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </div>
      <div class="bio">${cfg.subtitle||'Jewellery Store'}</div>
      <div class="socials">${socialsHTML}</div>
    </div>

    ${bannerHTML}

    <div class="links">${linksHTML}</div>

    <div class="footer">${cfg.footer||'SWAG GOLD · سواج جولد'}</div>
  `;

  const qrbadge = document.getElementById('qrbadge');
  if (qrbadge && cfg.logoUrl) qrbadge.src = cfg.logoUrl;

  fetchGoldPrice();
  setInterval(fetchGoldPrice, 5*60*1000);
}

function doShare() {
  if (navigator.share) {
    navigator.share({title:'SWAG GOLD',url:location.href}).catch(()=>{});
  } else {
    navigator.clipboard?.writeText(location.href).then(()=>alert('Link copied!'));
  }
}

// ── QR CODE ──
function showQR() {
  const ov = document.getElementById('qrov');
  ov.classList.add('open');
  const box = document.getElementById('qrbox');
  if (box.innerHTML) return;
  try {
    const qr = qrcode(0,'M');
    qr.addData(location.href);
    qr.make();
    box.innerHTML = qr.createSvgTag({cellSize:4,margin:4});
  } catch(e){}
}
function closeQR(){ document.getElementById('qrov').classList.remove('open'); }

// ── FULLSCREEN ──
function toggleFs() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen().catch(()=>{});
  }
}

// ── LIGHTBOX ──
let lbImgs=[], lbIdx=0;
function openLB(imgs,idx){ lbImgs=imgs; lbIdx=idx; document.getElementById('lbox').classList.add('open'); lbShow(); }
function lbShow(){ document.getElementById('lbimg').src=lbImgs[lbIdx]; document.getElementById('lbcount').textContent=(lbIdx+1)+' / '+lbImgs.length; }
function lbNav(d){ lbIdx=(lbIdx+d+lbImgs.length)%lbImgs.length; lbShow(); }
function closeLB(){ document.getElementById('lbox').classList.remove('open'); }
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeQR();closeLB();}
  if(e.key==='ArrowLeft')lbNav(-1);
  if(e.key==='ArrowRight')lbNav(1);
});
