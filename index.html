<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SWAG GOLD Official: TikTok, Instagram</title>
<meta name="description" content="Jewellery Store — Jeddah">
<meta property="og:title" content="SWAG GOLD">
<meta property="og:description" content="Jewellery Store">
<meta name="theme-color" content="#2a1a08">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SWAG GOLD">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700&family=Cormorant+Garamond:wght@600;700&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#d4a84b;--gold2:#f7ecc4;--gold3:#c9952b;--dark:#2a1a08;--radius:44px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:auto;min-height:100%}
html{scroll-behavior:smooth}
body{
  font-family:'Jost',sans-serif;color:#fff;
  min-height:100dvh;background:#2a1a08;
  display:flex;justify-content:center;align-items:flex-start;
  overflow-x:hidden;-webkit-overflow-scrolling:touch
}

/* ── WARM BACKGROUND ── */
.bg-warm{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;height:100dvh;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 30% 20%, rgba(180,90,10,.55) 0%, transparent 65%),
    radial-gradient(ellipse 60% 80% at 75% 70%, rgba(140,60,5,.45) 0%, transparent 60%),
    radial-gradient(ellipse 90% 70% at 50% 50%, rgba(90,40,5,.3) 0%, transparent 80%),
    linear-gradient(160deg, #4a2508 0%, #3a1c06 20%, #2a1508 40%, #1e0f05 60%, #2d1808 80%, #3e2208 100%)
}
.bg-warm::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  opacity:.35;mix-blend-mode:overlay;pointer-events:none
}

/* ── VIDEO ── */
#cardv{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;height:100dvh;object-fit:cover;
  z-index:1;opacity:0;transition:opacity 1s ease
}
#cardv.loaded{opacity:1}

.scrim{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  max-width:480px;left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,
    rgba(0,0,0,.4) 0%,
    rgba(0,0,0,.05) 30%,
    rgba(0,0,0,0) 55%,
    rgba(0,0,0,.25) 100%)
}

.card{
  width:100%;max-width:480px;min-height:100dvh;position:relative;
  display:flex;flex-direction:column;justify-content:flex-start;
  animation:fade .6s ease both;z-index:3
}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;pointer-events:none
}
.topbar>*{pointer-events:all}
.chip{
  width:42px;height:42px;border-radius:50%;
  background:rgba(30,16,4,.5);color:#fff;
  display:grid;place-items:center;text-decoration:none;
  border:1px solid rgba(212,168,75,.4);transition:background .2s
}
.chip:hover{background:rgba(30,16,4,.8)}
.chip svg{width:18px;height:18px}
.chip .ast{font-size:21px;line-height:1;font-weight:700}

/* ── GOLD TICKER ── */
.ticker-bar{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:15;
  display:flex;align-items:center;justify-content:center;
  gap:16px;padding:8px 16px;
  background:rgba(20,10,2,.72);
  border-bottom:1px solid rgba(212,168,75,.25);
  font-family:'Jost',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:.04em;color:#e8d5a0
}
.ticker-bar.hidden{display:none}
.ticker-item{display:flex;align-items:center;gap:5px;white-space:nowrap}
.ticker-item .karat{color:rgba(212,168,75,.7);font-size:10px;font-weight:500}
.ticker-item .price{color:#f5e4a8;font-weight:700}
.ticker-item .unit{color:rgba(200,175,120,.55);font-size:10px}
.ticker-dot{width:3px;height:3px;border-radius:50%;background:rgba(212,168,75,.35)}
.ticker-time{color:rgba(200,175,120,.45);font-size:9px;margin-left:4px}

/* ── CONTENT ── */
.content{position:relative;z-index:2;padding:80px 18px 100px;width:100%}
body.has-ticker .content{padding-top:96px}

/* ── LOGO ── */
.avatar-wrap{display:flex;justify-content:center;margin-bottom:0}
.logo-svg-wrap{
  width:90px;height:90px;border-radius:50%;
  border:2.5px solid rgba(212,168,75,.6);
  background:rgba(42,26,8,.85);
  display:flex;align-items:center;justify-content:center;margin:0 auto;
  box-shadow:0 0 20px rgba(212,168,75,.2)
}
.logo-img{
  width:90px;height:90px;border-radius:50%;
  border:2.5px solid rgba(212,168,75,.6);
  object-fit:cover;display:block;
  box-shadow:0 0 20px rgba(212,168,75,.2)
}

/* ── NAME ── */
.name-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:9px}
.nm{
  font-family:'Cormorant Garamond',serif;font-weight:700;
  letter-spacing:.1em;font-size:clamp(26px,7vw,33px);
  text-transform:uppercase;
  background:linear-gradient(100deg,#f7ecc4 0%,#d4a84b 22%,#fff6da 42%,#c9952b 58%,#f7ecc4 82%);
  background-size:220% auto;
  -webkit-background-clip:text;background-clip:text;
  color:transparent;-webkit-text-fill-color:transparent;
  animation:shine 4.5s linear infinite;
  filter:drop-shadow(0 2px 12px rgba(0,0,0,.75))
}
@keyframes shine{to{background-position:220% center}}

.subtitle{
  text-align:center;font-size:13px;
  color:rgba(255,255,255,.65);margin-top:4px;letter-spacing:.04em
}

/* ── VERIFIED BADGE ── */
.badge-verified{
  display:inline-flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:50%;
  background:linear-gradient(135deg,#d4a84b,#f7ecc4);
  flex-shrink:0
}
.badge-verified svg{width:12px;height:12px;fill:#2a1a08}

/* ── SOCIALS ── */
.socials{
  display:flex;gap:22px;justify-content:center;
  margin-top:14px;margin-bottom:2px
}
.soc{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.1);
  display:grid;place-items:center;text-decoration:none;
  border:1px solid rgba(212,168,75,.3);
  transition:background .25s,transform .2s,box-shadow .25s;
  color:#fff
}
.soc:hover{
  background:rgba(212,168,75,.25);
  transform:translateY(-3px);
  box-shadow:0 6px 18px rgba(212,168,75,.25)
}
.soc svg{width:20px;height:20px}

/* ── BANNER ── */
.banner{
  margin:14px 0 8px;
  background:linear-gradient(90deg,rgba(212,168,75,.18),rgba(212,168,75,.08),rgba(212,168,75,.18));
  border:1px solid rgba(212,168,75,.35);
  border-radius:12px;padding:9px 14px;
  font-size:13px;color:#f5e4a8;text-align:center;
  display:none
}
.banner.show{display:block}

/* ── LINKS ── */
.links{display:flex;flex-direction:column;gap:11px;margin-top:18px}

.link-btn{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;border-radius:var(--radius);
  background:rgba(255,255,255,.07);
  border:1px solid rgba(212,168,75,.22);
  text-decoration:none;color:#fff;
  transition:background .25s,box-shadow .25s,transform .2s,border-color .25s;
  position:relative;overflow:hidden;cursor:pointer
}
.link-btn::before{
  content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(90deg,transparent,rgba(212,168,75,.15),transparent);
  transition:opacity .35s
}
.link-btn:hover::before{opacity:1}
.link-btn:hover{
  background:rgba(255,255,255,.12);
  border-color:rgba(212,168,75,.5);
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(0,0,0,.35),0 0 0 1px rgba(212,168,75,.18)
}
.link-btn:active{transform:translateY(0);box-shadow:none}

.btn-icon{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:rgba(212,168,75,.12);border:1px solid rgba(212,168,75,.3);
  display:grid;place-items:center;
  transition:background .25s
}
.link-btn:hover .btn-icon{background:rgba(212,168,75,.22)}
.btn-icon svg{width:20px;height:20px;color:#d4a84b}

.btn-labels{flex:1;min-width:0}
.btn-en{
  font-size:14.5px;font-weight:600;letter-spacing:.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.btn-ar{
  font-family:'Cairo',sans-serif;font-size:12px;
  color:rgba(255,255,255,.55);margin-top:1px;
  direction:rtl;white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.btn-arrow{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  display:grid;place-items:center;transition:background .2s
}
.link-btn:hover .btn-arrow{background:rgba(212,168,75,.2);border-color:rgba(212,168,75,.4)}
.btn-arrow svg{width:14px;height:14px;color:rgba(255,255,255,.6)}

/* ── FOOTER ── */
.footer{
  text-align:center;font-size:11px;
  color:rgba(255,255,255,.25);padding:28px 0 20px;
  letter-spacing:.06em;font-family:'Cairo',sans-serif
}

/* ── SHARE SHEET ── */
.share-overlay{
  position:fixed;inset:0;z-index:99;
  background:rgba(0,0,0,.65);backdrop-filter:blur(6px);
  display:none;align-items:flex-end;justify-content:center
}
.share-overlay.open{display:flex}
.share-sheet{
  width:100%;max-width:480px;
  background:linear-gradient(160deg,#3a2008,#2a1508);
  border:1px solid rgba(212,168,75,.3);
  border-radius:28px 28px 0 0;padding:28px 24px 40px;
  display:flex;flex-direction:column;gap:18px;
  animation:slideUp .3s ease
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.share-title{font-size:15px;font-weight:600;color:#f5e4a8;text-align:center}
.share-grid{display:flex;gap:18px;justify-content:center;flex-wrap:wrap}
.share-item{
  display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;
  background:none;border:none;color:#fff;font-size:12px;font-family:'Jost',sans-serif
}
.share-item-icon{
  width:52px;height:52px;border-radius:16px;
  background:rgba(212,168,75,.12);border:1px solid rgba(212,168,75,.3);
  display:grid;place-items:center
}
.share-item-icon svg{width:24px;height:24px;color:#d4a84b}
.share-close{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  color:#fff;border-radius:14px;padding:12px;font-size:14px;font-weight:500;cursor:pointer;
  font-family:'Jost',sans-serif
}

/* ── SCROLL TOP ── */
#scrollTop{
  position:fixed;bottom:80px;right:18px;z-index:50;
  width:40px;height:40px;border-radius:50%;
  background:rgba(20,10,2,.7);border:1px solid rgba(212,168,75,.4);
  display:none;place-items:center;cursor:pointer;color:#d4a84b;
  transition:opacity .3s
}
#scrollTop.show{display:grid}
#scrollTop svg{width:18px;height:18px}
</style>
</head>

  try {
    const r = await fetch('./config.json?v=' + Date.now());

    return await r.json();

    return {

      footer:'SWAG GOLD · سواج جولد',
      logoUrl:'', banner:{text:'',show:false},
      socials:[

function renderConfig(cfg){
  // Title / Subtitle
  document.getElementById('siteName').textContent = cfg.title || 'SWAG GOLD';
  document.getElementById('siteSubtitle').textContent = cfg.subtitle || 'Jewellery Store';
  document.getElementById('siteFooter').textContent = cfg.footer || 'SWAG GOLD · سواج جولد';
  document.title = (cfg.title || 'SWAG GOLD') + ' Official';

  // Logo
  if(cfg.logoUrl && cfg.logoUrl.trim()){
    const wrap = document.getElementById('logoWrap');
    wrap.className = '';
    wrap.innerHTML = `<img src="${cfg.logoUrl}" alt="${cfg.title||'SWAG GOLD'} logo" class="logo-img" width="90" height="90" loading="lazy">`;
  }

  // Banner
  const bannerEl = document.getElementById('bannerEl');
  if(cfg.banner && cfg.banner.show && cfg.banner.text){
    bannerEl.textContent = cfg.banner.text;
    bannerEl.classList.add('show');
  }

  // Socials
  const sw = document.getElementById('socialsWrap');
  sw.innerHTML = '';
  (cfg.socials || []).forEach(s => {
    const a = document.createElement('a');
    a.href = s.url; a.target='_blank'; a.rel='noopener noreferrer';
    a.className = 'soc'; a.setAttribute('aria-label', s.icon);
    a.innerHTML = getIcon(s.icon);
    sw.appendChild(a);
  });

  // Links
  const lw = document.getElementById('linksWrap');
  lw.innerHTML = '';
  (cfg.links || []).filter(l => !l.hidden).forEach(l => {
    const a = document.createElement('a');
    a.href = l.url; a.target='_blank'; a.rel='noopener noreferrer';
    a.className = 'link-btn';
    a.innerHTML = `
      <div class="btn-icon">${getIcon(l.icon)}</div>
      <div class="btn-labels">
        <div class="btn-en">${l.label||''}</div>
        ${l.labelAr ? `<div class="btn-ar">${l.labelAr}</div>` : ''}
      </div>
      <div class="btn-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>`;
    lw.appendChild(a);
  });
}

// ── GOLD PRICE TICKER ──
async function fetchGoldPrice(){
  try {
    const r = await fetch('https://api.gold-api.com/price/XAU');
    if(!r.ok) throw new Error();
    const d = await r.json();
    const usd = d.price; // USD per troy oz
    const sar_per_g_24 = usd * 3.75 / 31.1035;
    const p24 = sar_per_g_24.toFixed(1);
    const p21 = (sar_per_g_24 * 21/24).toFixed(1);
    const p18 = (sar_per_g_24 * 18/24).toFixed(1);
    document.getElementById('p24').textContent = p24;
    document.getElementById('p21').textContent = p21;
    document.getElementById('p18').textContent = p18;
    const now = new Date();
    document.getElementById('tickerTime').textContent =
      now.toLocaleTimeString('en-SA',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('tickerBar').classList.remove('hidden');
    document.body.classList.add('has-ticker');
    // Adjust topbar padding
    document.querySelector('.topbar').style.top = '36px';
  } catch(e){
    // If API fails, hide ticker — no broken UI
    document.getElementById('tickerBar').classList.add('hidden');
  }
}

// ── SHARE ──
document.getElementById('shareBtn').addEventListener('click', () => {
  document.getElementById('shareOverlay').classList.add('open');
});
document.getElementById('shareClose').addEventListener('click', () => {
  document.getElementById('shareOverlay').classList.remove('open');
});
document.getElementById('shareOverlay').addEventListener('click', (e) => {
  if(e.target === document.getElementById('shareOverlay'))
    document.getElementById('shareOverlay').classList.remove('open');
});

function shareVia(type){
  const url = location.href;
  if(type === 'whatsapp'){
    window.open('https://wa.me/?text=' + encodeURIComponent('SWAG GOLD Jewellery Store 🥇\n' + url), '_blank');
  } else if(type === 'copy'){
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.share-item:nth-child(2) span');
      if(btn){ btn.textContent = 'Copied!'; setTimeout(()=>btn.textContent='Copy Link', 2000); }
    });
  } else if(type === 'native'){
    if(navigator.share){
      navigator.share({title:'SWAG GOLD',text:'Jewellery Store',url});
    }
  }
}

// ── SCROLL TOP ──
const scrollBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => {
  scrollBtn.classList.toggle('show', window.scrollY > 300);
}, {passive: true});
scrollBtn.addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));

// ── INIT ──
(async function(){
  const cfg = await loadConfig();
  renderConfig(cfg);
  await fetchGoldPrice();
  // Refresh price every 5 minutes
  setInterval(fetchGoldPrice, 5 * 60 * 1000);
})();
